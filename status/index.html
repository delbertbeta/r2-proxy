<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>R2 Proxy Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/app.css">
  </head>
  <body data-view="login">
    <div class="noise"></div>
    <main class="app-shell">
      <section id="login-panel" class="login-panel">
        <div class="login-card">
          <p class="eyebrow">R2 Proxy Status</p>
          <h1>Operational Board</h1>
          <form id="login-form" class="login-form">
            <label for="api-key">API Key</label>
            <input id="api-key" name="api-key" type="password" autocomplete="current-password" required>
            <button type="submit">Unlock Dashboard</button>
          </form>
          <p id="login-error" class="error-text" hidden>Invalid API key.</p>
        </div>
      </section>

      <section id="dashboard" class="dashboard" hidden>
        <header class="hero">
          <div>
            <p class="eyebrow">Operational Board</p>
            <h1>R2 Proxy Status</h1>
            <p class="muted">Traffic, cache behavior, and error pressure across the last seven days.</p>
          </div>
          <div class="controls">
            <label class="control">
              <span>Bucket</span>
              <select id="bucket-filter"></select>
            </label>
            <button id="logout-button" class="ghost-button" type="button">Forget API Key</button>
          </div>
        </header>

        <section id="metrics" class="metric-grid"></section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Time Windows</p>
              <h2>Recent Trends</h2>
            </div>
            <div id="range-switcher" class="range-switcher">
              <button data-range="1h" class="active" type="button">1H</button>
              <button data-range="24h" type="button">24H</button>
              <button data-range="7d" type="button">7D</button>
            </div>
          </div>
          <p id="dashboard-error" class="error-text" hidden></p>
          <div id="summary-strip" class="summary-strip"></div>
          <div id="charts" class="chart-grid"></div>
        </section>

        <section class="leaderboard-grid">
          <article class="panel">
            <div class="panel-header compact">
              <div>
                <p class="eyebrow">Top 10</p>
                <h2>Hot Cache Files</h2>
              </div>
            </div>
            <div id="hot-files"></div>
          </article>
          <article class="panel">
            <div class="panel-header compact">
              <div>
                <p class="eyebrow">Top 10</p>
                <h2>Miss URLs</h2>
              </div>
            </div>
            <div id="miss-urls"></div>
          </article>
          <article class="panel">
            <div class="panel-header compact">
              <div>
                <p class="eyebrow">Top 10</p>
                <h2>404 URLs</h2>
              </div>
            </div>
            <div id="not-found-urls"></div>
          </article>
          <article class="panel">
            <div class="panel-header compact">
              <div>
                <p class="eyebrow">Top 10</p>
                <h2>5xx URLs</h2>
              </div>
            </div>
            <div id="server-error-urls"></div>
          </article>
        </section>
      </section>
    </main>
    <script src="https://unpkg.com/apexcharts@3.54.1/dist/apexcharts.min.js" defer></script>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
